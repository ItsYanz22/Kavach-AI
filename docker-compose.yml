version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: kavach-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./kavach.db
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=docker-dev
      # CORS: Allow frontend running on any local port
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - ./backend:/app/backend
      - ./kavach.db:/app/kavach.db
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - kavach-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: kavach-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
    command: npm run dev
    depends_on:
      - backend
    networks:
      - kavach-network
    environment:
      # Inside Docker, the backend service is accessible at: http://backend:8000
      # This is the Docker DNS name for the backend container
      - VITE_BACKEND_URL=http://backend:8000
      # Tell Vite to listen on all interfaces so it's accessible from host machine
      - VITE_HOST=0.0.0.0

networks:
  kavach-network:
    driver: bridge
