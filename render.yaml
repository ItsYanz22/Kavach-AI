services:
  - type: web
    name: kavach-ai-backend
    env: docker
    dockerfilePath: ./Dockerfile.production
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://your-vercel-app-url.vercel.app" # User needs to update this with their Vercel frontend URL
